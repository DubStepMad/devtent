name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - name: Build installer (signed when secrets are configured)
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CODE_SIGNING_CERT }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_PASSWORD }}
        run: npm run dist

      - name: Electron E2E smoke
        working-directory: packages/desktop
        run: npx electron . --e2e-smoke

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $installer = Get-ChildItem "packages/desktop/release" -Filter "DevTent Setup *.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer not found" }
          gh release create "${{ github.ref_name }}" `
            --title "DevTent $version" `
            --notes-file CHANGELOG.md `
            "$($installer.FullName)"
