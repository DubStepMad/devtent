name: Documentation
description: Report unclear, missing, or incorrect docs
title: "[Docs] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve README, CONTRIBUTING, installer copy, or in-app guidance.

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      placeholder: e.g. README doesn't explain how to roll back an update; Quick Add docs omit Composer.
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Where did you look?
      placeholder: e.g. README, Settings UI, CONTRIBUTING.md, installer welcome screen
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement (optional)
      description: If you know what the docs should say, paste a draft or outline.
